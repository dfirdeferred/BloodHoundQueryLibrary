name: Non-Tier Zero principals with ownership of Domain Controllers
guid: 99b01f7f-6bd7-4309-8a67-d16d836236c6
prebuilt: false
platforms: Active Directory
category: Dangerous Privileges
description: 
query: |-
  MATCH p=(n:Base)-[r:OwnsRaw|Owns|OwnsLimitedRights]->(dc:Computer)
  WHERE NOT ((n:Tag_Tier_Zero) OR COALESCE(n.system_tags, '') CONTAINS 'admin_tier_0')
  AND dc.isdc = true
  RETURN p
