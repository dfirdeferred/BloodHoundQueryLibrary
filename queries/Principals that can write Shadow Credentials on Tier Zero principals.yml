name: Principals with write Shadow Credentials on Tier Zero principals
guid: 96e86fb9-4cd6-4df3-81a6-e36fd7a34614
prebuilt: false
platforms: Active Directory
category: Kerberos Interaction
description: Principals with the ability to write to the 'msds-KeyCredentialLink' property on a Tier Zero principal.
query: |-
  MATCH p=(n:Base)-[:AddKeyCredentialLink]->(m:Base)
  WHERE (n:User or n:Computer)
  AND ((m:Tag_Tier_Zero) OR COALESCE(m.system_tags, '') CONTAINS 'admin_tier_0')
  RETURN p
  LIMIT 1000
revision: 1
resources: https://specterops.io/blog/2021/06/17/shadow-credentials-abusing-key-trust-account-mapping-for-account-takeover/
acknowledgements: Martin Sohn Christensen, @martinsohndk
