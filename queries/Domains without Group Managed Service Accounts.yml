name: Domains without Group Managed Service Accounts
guid: 86b0e862-88d6-4202-9fc1-009746d313f7
prebuilt: false
platforms: Active Directory
category: Domain Information
description: Returns domains that do not use Group Managed Service Accounts (gMSAs)
query: |-
  MATCH (domain:Domain)
  OPTIONAL MATCH (gmsa:User)
  WHERE gmsa.domainsid = domain.objectid AND gmsa.gmsa = true
  WITH domain, COLLECT(gmsa) AS domaingmsa
  WHERE SIZE(domaingmsa) = 0
  RETURN domain
revision: 1
resources: https://learn.microsoft.com/en-us/windows-server/identity/ad-ds/manage/group-managed-service-accounts/group-managed-service-accounts/group-managed-service-accounts-overview
acknowledgements: Martin Sohn Christensen, @martinsohndk

