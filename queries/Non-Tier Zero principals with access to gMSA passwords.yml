name: Non-Tier Zero principals with access to gMSA passwords
guid: ef587ba1-a740-4bcf-b4e0-e1137d01b1af
prebuilt: false
platforms: Active Directory
category: Dangerous Privileges
description: Finds non-Tier Zero principals that can read Group Managed Service Account (gMSA) passwords, or modify the msDS-GroupMSAMembership property which controls who can access the password. Unauthorized access to gMSA passwords allows an attacker to authenticate as the service account and access any resource it manages.
query: |-
  MATCH p=(n:Base)-[r:ReadGMSAPassword|GenericAll|GenericWrite|WriteOwner|WriteDacl]->(m:User)
  WHERE m.gmsa = true
  // Exclude Tier Zero principals
  AND NOT ((n:Tag_Tier_Zero) OR COALESCE(n.system_tags, '') CONTAINS 'admin_tier_0')
  RETURN p
revision: 1
resources:
  - https://learn.microsoft.com/en-us/windows-server/security/group-managed-service-accounts/group-managed-service-accounts-overview
acknowledgements: Martin Sohn Christensen, @martinsohndk
