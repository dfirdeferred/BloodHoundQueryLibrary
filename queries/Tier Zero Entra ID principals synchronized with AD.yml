category: Cross Platform Attack Paths
description: 
query: |-
  MATCH p=(ad:Base)-[:SyncedToEntraUser]->(entra:AZBase)
  WHERE ((entra:Tag_Tier_Zero) OR COALESCE(entra.system_tags, '') CONTAINS 'admin_tier_0')
  RETURN p
  LIMIT 100
