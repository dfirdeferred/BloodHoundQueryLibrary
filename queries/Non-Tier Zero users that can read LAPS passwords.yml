name: Non-Tier Zero users that can read LAPS passwords
guid: d1779573-7ad5-4a78-a5e5-9dd53a1eb1a1
prebuilt: false
platform: Active Directory
category: Dangerous Privileges
description: Non-Tier Zero principals with direct LAPS password read capability present a lateral movement risk through local administrator credential exposure.
query: |-
  MATCH p=(n:Base)-[:ReadLAPSPassword|AllExtendedRights|GenericAll|SyncLAPSPassword]->(c:Computer)
  WHERE c.haslaps = true
  AND c.enabled = true
  AND NOT ((n:Tag_Tier_Zero) OR COALESCE(n.system_tags, '') CONTAINS 'admin_tier_0')
  RETURN p
  LIMIT 1000
revision: 1
resources:
  - https://learn.microsoft.com/en-us/windows-server/identity/laps/laps-overview
acknowledgements: Martin Sohn Christensen, @martinsohndk
