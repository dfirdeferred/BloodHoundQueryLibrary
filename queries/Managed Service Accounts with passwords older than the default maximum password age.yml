name: Managed Service Accounts with passwords older than the default maximum password age
guid: e1ec8c3d-14c4-425a-b6fb-d401633b915d
prebuilt: false
platforms: Active Directory
category: Active Directory Hygiene
description: Managed Service Account (gMSA / sMSA) passwords are automatically changed by AD every 30 days for security purposes.
query: |-
  WITH 60 as rotation_period
  MATCH (n:Base)
  WHERE (n.gmsa = true OR n.msa = true)
  AND n.pwdlastset < (datetime().epochseconds - (rotation_period * 86400)) // password not rotated
  AND n.enabled = true // enabled principals
  AND n.whencreated < (datetime().epochseconds - (rotation_period * 86400)) // exclude recently created computers
  AND n.lastlogontimestamp > (datetime().epochseconds - (rotation_period * 86400)) // active computers (Replicated value)
  AND n.lastlogon > (datetime().epochseconds - (rotation_period * 86400)) // active computers (Non-replicated value)
  RETURN n
revision: 1
resources:
- https://learn.microsoft.com/en-us/entra/architecture/service-accounts-group-managed
- https://learn.microsoft.com/en-us/entra/architecture/service-accounts-standalone-managed
