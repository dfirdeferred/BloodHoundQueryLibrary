name: Computers with non-default Primary Group membership
guid: 5862dc4e-6f6f-4321-9474-d838968495ed
prebuilt: false
platforms: Active Directory
category: Active Directory Hygiene
description: 
query: |-
		// Domain Controllers
		MATCH p1=(n:Computer)-[r:MemberOf]->(g:Group)
		WHERE NOT g.objectid ENDS WITH "-516"
		AND n.isdc = true
		AND r.isprimarygroup = true

		// Domain Computers
		OPTIONAL MATCH p2=(n:Computer)-[r:MemberOf]->(g:Group)
		WHERE NOT g.objectid ENDS WITH "-515"
		AND NOT n.isdc = true
		AND NOT n.isreadonlydc = true
		AND r.isprimarygroup = true

		// Read-Only Domain Controllers
		OPTIONAL MATCH p3=(n:Computer)-[r:MemberOf]->(g:Group)
		WHERE NOT g.objectid ENDS WITH "-521"
		AND n.isreadonlydc = true
		AND r.isprimarygroup = true

		RETURN p1,p2,p3
revision: 3
